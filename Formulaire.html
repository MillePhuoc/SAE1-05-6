<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Formulaire.css">
</head>
<body>
    <nav>

    </nav>
    <form action="post">
        <div class="field">
            <label for="nom">Nom*</label>
            <input type="text" name="nom" placeholder="Votre nom" id="nom" required>
        </div>
        
        <div class="field">
            <label for="prenom">Prenom*</label>
            <input type="text" name="prenom" placeholder="Votre prenom" id="prenom" required>
        </div>
        <div class="field">
            <label for="Email">Email*</label>
            <input type="email" name="Email" placeholder="toto@gmail.com" id="Email"  required>
        </div>
        <div class="field">
            <label for="Téléphone">Téléphone</label>
            <input type="tel" name="Téléphone" placeholder="+33 1 23 45 67 89" id="Téléphone">
        </div>
        <div class="field">
            <label for="CV">CV*</label>
            <input type="file" name="CV" id="CV">
        </div>
        <div class="field">
            <label for="LM">Lettre de Motivation*</label>
            <input type="file" name="LM" id="LM">
        </div>
        <div class="field">
            <label for="Desc">Description*</label>
            <textarea name="Desc" id="Desc"></textarea>
        </div>
        <div class="field">
            <input type="checkbox" name="CD"> J'ai lu et déclare accepter les <a href="">codition d'utilisation</a>*
        </div>
        <div class="field">
            <button>S'inscrire</button>
        </div>
    </form>
</body>
</html>
